name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Compile
        run: python -m compileall src tests

      - name: Test
        run: python -m unittest discover -s tests

      - name: CLI smoke
        run: |
          specforge --version
          specforge init .
          test -f .specforge/facts.json
          test -f specforge-output/overview.md
          test -f specforge-output/feature-map.md
